<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 28px; color: #4f46e5; margin-bottom: 12px; }
    p { font-size: 16px; line-height: 1.7; color: #666; margin-bottom: 8px; }
    .badge { display: inline-block; background: #eef2ff; color: #4f46e5; padding: 6px 16px; border-radius: 20px; font-size: 14px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>안녕하세요!</h1>
    <p>웹 개발을 공부하고 있는 유진입니다.</p>
    <p>이 페이지는 GitHub Pages로 배포된<br>나의 첫 번째 웹사이트입니다.</p>
    <span class="badge">🚀 GitHub Pages 배포 완료</span>
  </div>
</body>
</html>
